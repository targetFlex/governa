name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/governa-core/**'
      - 'apps/governa-gateway/**'
      - 'infra/**'
      - 'scripts/deploy.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: sha do commit)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io

jobs:
  # ── Build e push das imagens para GHCR ───────────────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [governa-core, governa-gateway]
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ── Deploy no VPS via SSH ────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    # Só executa em push para main ou dispatch manual
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check VPS secrets
        id: vps
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          if [ -z "$VPS_HOST" ]; then
            echo "::warning::VPS_HOST não configurado — deploy ignorado até o VPS estar provisionado"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve image tag
        id: tag
        if: steps.vps.outputs.ready == 'true'
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "value=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        if: steps.vps.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.value }}
          IMAGE_OWNER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_TAG,IMAGE_OWNER,GHCR_TOKEN,GITHUB_ACTOR
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            cd /opt/governa
            git pull origin main
            IMAGE_TAG="$IMAGE_TAG" IMAGE_OWNER="$IMAGE_OWNER" ./scripts/deploy.sh "$IMAGE_TAG"
