name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: '9.0.0'
  NODE_VERSION: '22'

jobs:
  # ─── Lint + Typecheck + Test + Build (matrix por app) ───────────────────────
  ci:
    name: "${{ matrix.app }} — ${{ matrix.stage }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [governa-core, governa-gateway]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies (workspace)
        run: pnpm install --frozen-lockfile

      # ── Prisma Client generate (governa-core only) ────────────────────────────
      - name: Generate Prisma Client
        if: matrix.app == 'governa-core'
        run: pnpm --filter governa-core exec prisma generate

      # ── Lint ──────────────────────────────────────────────────────────────────
      - name: "[${{ matrix.app }}] Lint"
        run: pnpm --filter ${{ matrix.app }} lint

      # ── Typecheck ─────────────────────────────────────────────────────────────
      - name: "[${{ matrix.app }}] Typecheck"
        run: pnpm --filter ${{ matrix.app }} typecheck

      # ── Test + Coverage ≥ 80% ────────────────────────────────────────────────
      - name: "[${{ matrix.app }}] Test (coverage ≥ 80%)"
        run: pnpm --filter ${{ matrix.app }} test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.app }}
          path: apps/${{ matrix.app }}/coverage/lcov.info
          retention-days: 14

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: "[${{ matrix.app }}] Build"
        run: pnpm --filter ${{ matrix.app }} build

  # ─── Gate único para branch protection rule ───────────────────────────────
  ci-passed:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [ci]
    if: always()
    steps:
      - name: Check all matrix jobs passed
        run: |
          if [[ "${{ needs.ci.result }}" != "success" ]]; then
            echo "❌ Um ou mais jobs do CI falharam: ${{ needs.ci.result }}"
            exit 1
          fi
          echo "✅ Todos os jobs passaram."
