# otel-collector-config-local.yaml
# Configuração simplificada para validação local da stack de produção.
# Não inclui exporters Datadog/SigNoz — evita falhas por credenciais ausentes.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 512

  attributes/remove_pii:
    actions:
      - key: http.request.header.authorization
        action: delete
      - key: http.request.header.cookie
        action: delete
      - key: db.statement
        action: delete

  resource/add_env:
    attributes:
      - key: deployment.environment
        value: production-local
        action: upsert

exporters:
  debug:
    verbosity: normal

  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: governa

service:
  telemetry:
    logs:
      level: info

  pipelines:
    traces:
      receivers:  [otlp]
      processors: [attributes/remove_pii, batch]
      exporters:  [debug]

    metrics:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [debug, prometheus]

    logs:
      receivers:  [otlp]
      processors: [attributes/remove_pii, resource/add_env, batch]
      exporters:  [debug]
