# otel-collector-config.yaml — Configuração do OpenTelemetry Collector para dev/prod.
#
# Recebe traces, metrics e LOGS via OTLP HTTP/gRPC de governa-core e governa-gateway.
# Em desenvolvimento: exporta para console (debug) e arquivo de logs (/tmp/otel-logs.json).
# Com DD_API_KEY: exporta também para Datadog (traces, metrics, logs).
# Prometheus scrape em :8889/metrics.
#
# Para SigNoz (alternativa ao Datadog):
#   Descomentar otlp/signoz e apontar ao endpoint SigNoz.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 512

  # Remove atributos com PII potencial antes de exportar
  attributes/remove_pii:
    actions:
      - key: http.request.header.authorization
        action: delete
      - key: http.request.header.cookie
        action: delete
      - key: db.statement
        action: delete

  # Enriquece logs com service.name e deployment.environment
  resource/add_env:
    attributes:
      - key: deployment.environment
        value: ${DEPLOYMENT_ENV:-development}
        action: upsert

exporters:
  # Console — útil para debug local (traces, metrics, logs)
  debug:
    verbosity: normal

  # Prometheus — métricas scraped em :8889/metrics
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: governa

  # Arquivo de logs JSON — para inspeção local e auditoria
  # Escrito em /tmp/otel-logs.json dentro do container
  file/logs:
    path: /tmp/otel-logs.json
    rotation:
      max_megabytes: 10
      max_days: 3
      max_backups: 3

  # Datadog — ativo quando DD_API_KEY estiver definido no ambiente
  # Requer: DD_API_KEY no .env (infra/docker/.env)
  # Opcional: DD_SITE (padrão: datadoghq.com | alternativas: datadoghq.eu, us3.datadoghq.com)
  datadog:
    api:
      key: ${DD_API_KEY}
      site: ${DD_SITE:-datadoghq.com}

  # Para SigNoz (alternativa ao Datadog — descomentar em produção):
  # otlp/signoz:
  #   endpoint: ${SIGNOZ_OTLP_ENDPOINT:-http://signoz:4317}
  #   tls:
  #     insecure: true

service:
  telemetry:
    logs:
      level: info

  pipelines:
    traces:
      receivers:  [otlp]
      processors: [attributes/remove_pii, batch]
      exporters:  [debug, datadog]

    metrics:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [debug, prometheus, datadog]

    logs:
      receivers:  [otlp]
      processors: [attributes/remove_pii, resource/add_env, batch]
      exporters:  [debug, file/logs, datadog]
