version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: governa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     governa
      POSTGRES_PASSWORD: governa_dev_pw
      POSTGRES_DB:       governa_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U governa -d governa_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: governa_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  adminer:
    image: adminer:latest
    container_name: governa_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
volumes:
  postgres_data:
  redis_data:
