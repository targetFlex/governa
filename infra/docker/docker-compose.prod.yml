# ============================================================
# AICOCKPIT — Production Docker Compose
# Requer: infra/docker/.env (baseado em .env.production.example)
#
# Uso:
#   IMAGE_TAG=sha-abc123 docker compose -f docker-compose.prod.yml up -d
#
# Antes do primeiro deploy:
#   1. Copie .env.production.example para .env e preencha os valores
#   2. Garanta que DOMAIN aponte para o IP do servidor (DNS propagado)
#   3. Para Let's Encrypt staging → prod: mude ACME_CA_SERVER no .env
# ============================================================

services:

  # ── Traefik (reverse proxy + TLS automático) ─────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: governa_traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=governa_public
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      # HTTP → HTTPS redirect global
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      # ACME (TLS-challenge)
      # Default: staging. Para produção, defina ACME_CA_SERVER=https://acme-v02.api.letsencrypt.org/directory
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.caserver=${ACME_CA_SERVER:-https://acme-staging-v02.api.letsencrypt.org/directory}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
      # TLS 1.3 options (dynamic config)
      - ./traefik-tls.yml:/etc/traefik/dynamic/tls.yml:ro
    networks:
      - public

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: governa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: governa_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── OpenTelemetry Collector ──────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    container_name: governa_otel_collector
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    environment:
      DD_API_KEY: ${DD_API_KEY:-}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DEPLOYMENT_ENV: production
      SIGNOZ_OTLP_ENDPOINT: ${SIGNOZ_OTLP_ENDPOINT:-}
      SIGNOZ_INGESTION_KEY: ${SIGNOZ_INGESTION_KEY:-}
    networks:
      - backend

  # ── governa-gateway ──────────────────────────────────────────────────────
  governa-gateway:
    image: ghcr.io/${IMAGE_OWNER}/governa-gateway:${IMAGE_TAG:-latest}
    container_name: governa_gateway
    restart: unless-stopped
    environment:
      NODE_ENV: production
      GATEWAY_PORT: "3100"
      OTEL_SERVICE_NAME: governa-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      PROTHEUS_BASE_URL: ${PROTHEUS_BASE_URL}
      PROTHEUS_AUTH_MODE: ${PROTHEUS_AUTH_MODE:-oauth2}
      PROTHEUS_CLIENT_ID: ${PROTHEUS_CLIENT_ID}
      PROTHEUS_CLIENT_SECRET: ${PROTHEUS_CLIENT_SECRET}
      PROTHEUS_BASIC_USER: ${PROTHEUS_BASIC_USER}
      PROTHEUS_BASIC_PASS: ${PROTHEUS_BASIC_PASS}
      PROTHEUS_TIMEOUT_MS: "10000"
      PROTHEUS_MAX_RETRIES: "3"
      PROTHEUS_TOKEN_TTL_BUFFER_S: "30"
      PII_HMAC_SECRET: ${PII_HMAC_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - backend

  # ── governa-core (API pública via Traefik) ───────────────────────────────
  governa-core:
    image: ghcr.io/${IMAGE_OWNER}/governa-core:${IMAGE_TAG:-latest}
    container_name: governa_core
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      GATEWAY_BASE_URL: http://governa-gateway:3100
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      OTEL_SERVICE_NAME: governa-core
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      postgres:
        condition: service_healthy
      governa-gateway:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.docker.network=governa_public
      - traefik.http.routers.core.rule=Host(`api.${DOMAIN}`)
      - traefik.http.routers.core.entrypoints=websecure
      - traefik.http.routers.core.tls=true
      - traefik.http.routers.core.tls.certresolver=letsencrypt
      - traefik.http.routers.core.tls.options=default@file
      - traefik.http.services.core.loadbalancer.server.port=3000
    networks:
      - public
      - backend

networks:
  public:
    name: governa_public
  backend:
    name: governa_backend
    internal: true

volumes:
  postgres_data:
  redis_data:
  letsencrypt:
